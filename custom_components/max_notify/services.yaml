# Описание служб интеграции MaxNotify (имя и описание — в translations)
send_message:
  fields:
    entity_id:
      selector:
        entity:
          filter:
            domain: notify
          multiple: true
          reorder: true
    message:
      required: true
      selector:
        text:
          multiline: true
    title:
      example: "Заголовок"
      selector:
        text:
          multiline: true
    # notify:
    #   default: true
    #   selector:
    #     boolean:
    #   description: "If false, send without notifying recipients (silent)."
    advanced:
      collapsed: true
      fields:
        send_keyboard:
          default: true
          selector:
            boolean:
        config_entry_id:
          selector:
            config_entry:
              integration: max_notify
        recipient_id:
          # Положительное число — личный чат (User ID), отрицательное — группа (Chat ID)
          example: "-12345 или 12345"
          selector:
            text:
        chat_id:
          example: "-12345 или 12345"
          selector:
            text:
        user_id:
          example: "3391555"
          selector:
            text:
        buttons:
          example: >
            {"Button 1":"button_1","Button 2":"button_2"} или
            [{"text":"Button 1","payload":"button_1"},{"text":"Button 2","payload":"button_2"}] или
            [[{"type":"link","text":"Откройте сайт","url":"https://example.com"}]] (только http/https) или
            [{"Ряд 1 / Кнопка 1":"r1_b1"},{"Ряд 2 / Кнопка 1":"r2_b1","Ряд 2 / Кнопка 2":"r2_b2"}]
          selector:
            object:

send_photo:
  fields:
    file:
      required: true
      description: "Local path (/config/..., /media/...) or image URL (http/https)"
      selector:
        text:
    caption:
      selector:
        text:
          multiline: true
    # notify:
    #   default: true
    #   selector:
    #     boolean:
    #   description: "If false, send without notifying recipients (silent)."
    entity_id:
      selector:
        entity:
          filter:
            domain: notify
          multiple: true
          reorder: true
    advanced:
      collapsed: true
      fields:
        send_keyboard:
          default: true
          selector:
            boolean:
        config_entry_id:
          selector:
            config_entry:
              integration: max_notify
        recipient_id:
          example: "-12345 или 12345"
          selector:
            text:
        chat_id:
          selector:
            text:
        user_id:
          selector:
            text:
        count_requests:
          name: Count requests
          description: >
            How many times to POST the message while waiting for attachment processing
            (attachment.not.ready). Increase for large files.
          selector:
            number:
              min: 1
              max: 60
              mode: box
        disable_ssl:
          name: Disable SSL verification
          description: >
            Disable SSL certificate validation for HTTP requests in this send operation.
            Use only when source/API endpoint uses self-signed or invalid certificates.
          default: false
          selector:
            boolean:
        buttons:
          example: >
            {"Button 1":"button_1","Button 2":"button_2"} или
            [{"text":"Button 1","payload":"button_1"},{"text":"Button 2","payload":"button_2"}] или
            [[{"type":"link","text":"Откройте сайт","url":"https://example.com"}]] (только http/https) или
            [{"Ряд 1 / Кнопка 1":"r1_b1"},{"Ряд 2 / Кнопка 1":"r2_b1","Ряд 2 / Кнопка 2":"r2_b2"}]
          selector:
            object:

