send_photo:
  fields:
    entity_id:
      selector:
        entity:
          filter:
            domain: notify
            integration: max_notify
          multiple: true
          reorder: true
    file:
      description: "Local path (/config/..., /media/...) or image URL (http/https)"
      selector:
        text:
    files:
      description: "List of local paths/URLs to send in one message (instead of file)"
      selector:
        object:
    caption:
      selector:
        text:
          multiline: true
    advanced:
      collapsed: true
      fields:
        format:
          selector:
            select:
              options:
                - text
                - markdown
                - html
              mode: dropdown
        send_keyboard:
          default: true
          selector:
            boolean:
        config_entry_id:
          selector:
            config_entry:
              integration: max_notify
        count_requests:
          name: Count requests
          description: >
            How many times to POST the message while waiting for attachment processing
            (attachment.not.ready). Increase for large files.
          selector:
            number:
              min: 1
              max: 60
              mode: box
        disable_ssl:
          name: Disable SSL verification
          description: >
            Disable SSL certificate validation for HTTP requests in this send operation.
            Use only when source/API endpoint uses self-signed or invalid certificates.
          default: false
          selector:
            boolean:
        url_auth_type:
          name: URL auth type
          description: >
            Authentication type for downloading media by URL: basic, digest or bearer.
            Required when URL or parameters include auth credentials.
          selector:
            select:
              options:
                - basic
                - digest
                - bearer
              mode: dropdown
        url_auth_login:
          name: URL auth login
          selector:
            text:
        url_auth_password:
          name: URL auth password
          selector:
            text:
        url_auth_token:
          name: URL auth token
          selector:
            text:
        buttons:
          example: >
            {"Button 1":"button_1","Button 2":"button_2"} или
            [{"text":"Button 1","payload":"button_1"},{"text":"Button 2","payload":"button_2"}] или
            [[{"type":"link","text":"Откройте сайт","url":"https://example.com"}]] (только http/https) или
            [{"Ряд 1 / Кнопка 1":"r1_b1"},{"Ряд 2 / Кнопка 1":"r2_b1","Ряд 2 / Кнопка 2":"r2_b2"}]
          selector:
            object:

